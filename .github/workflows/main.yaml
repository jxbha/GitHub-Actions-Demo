# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go
# how do workspaces get shared between jobs? https://docs.github.com/en/actions/learn-github-actions/workflow-syntax-for-github-actions#jobsjob_idstepsuses
# how do we share the built binary between jobs? https://docs.github.com/en/actions/learn-github-actions/workflow-syntax-for-github-actions#jobsjob_idstepsrun
# how do we give buildkit permissions to push to the registry? https://docs.github.com/en/actions/learn-github-actions/workflow-syntax-for-github-actions#jobsjob_idstepsrun
# where do results go? https://docs.github.com/en/actions/learn-github-actions/workflow-syntax-for-github-actions#jobsjob_idstepsrun
# where do we get the github sha from? https://docs.github.com/en/actions/learn-github-actions/environment-variables#default-environment-variables

# 1. clone the repo
# 2. run tests and build the binary
# 3. build the container and push to registry
# 4. deploy to kubernetes cluster

name: Go CI

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [ "main" ]

jobs:
  # Build and test on GitHub-hosted runner
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set_image.outputs.image_tag }}
      short_sha: ${{ steps.set_image.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Show Go version
        run: go version

      - name: Run unit tests
        run: go test -v ./...

      - name: Build linux binary
        run: |
          CGO_ENABLED=0 GOOS=linux go build -o mana .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: mana-binary
          path: .

      - name: Set image tag output
        id: set_image
        run: |
          # short sha for image tag
          short_sha=${GITHUB_SHA::7}
          image_tag="ghcr.io/${{ github.repository_owner }}/mana:${short_sha}"
          echo "image_tag=$image_tag" >> $GITHUB_OUTPUT
          echo "short_sha=$short_sha" >> $GITHUB_OUTPUT

  # Build and push Docker image (runs after build-and-test)
  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built binary
        uses: actions/download-artifact@v4
        with:
          name: mana-binary
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ needs.build-and-test.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
    outputs:
      image_tag: ${{ needs.build-and-test.outputs.image_tag }}
      short_sha: ${{ needs.build-and-test.outputs.short_sha }}

  deploy: 
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure kubeconfig
        run: |
          mkdir $HOME/.kube
          echo "$KUBE_CONFIG" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'
      - name: Verify kubeconfig
        run: |
          ls $HOME/.kube/config
          wc -c $HOME/.kube/config
      - name: Deploy to Kubernetes
        run: |
          echo "Deploying image ${{ needs.build-and-push.outputs.image_tag }} to Kubernetes"
          kubectl set image -n default deployment/mana mana=${{ needs.build-and-push.outputs.image_tag }}
          kubectl set env -n default deployment/mana VERSION=${{ needs.build-and-push.outputs.short_sha }}
